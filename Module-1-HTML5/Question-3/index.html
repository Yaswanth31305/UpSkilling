<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        Welcome User!
        <span style="color:red; font-weight:bold;">
            Special Offer Available
        </span>
    </div>

    <p class="highlight">New event registrations are open.</p>

</body>
</html>
