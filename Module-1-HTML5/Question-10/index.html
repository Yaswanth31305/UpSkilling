<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debugging Example</title>

    <script>

        let number1 = 10;
        let number2 = 20;

        let total = number1 + number2;

        console.log("Total Value =", total);

        debugger;

        console.log("Debugging Started");

    </script>
</head>
<body>

    <h2>Debugging with Chrome DevTools</h2>

    <p>
        Open Inspect Element → Console
        to view logs and debugging.
    </p>

</body>
</html>
