<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>
        .eventImage {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>Community Event Gallery</h2>

    <table border="1">
        <tr>
            <td>
                <img src="event1.jpg" alt="Music Event"
                     title="Music Event"
                     class="eventImage">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="event2.jpg" alt="Food Event"
                     title="Food Event"
                     class="eventImage">
                <p>Food Carnival</p>
            </td>

            <td>
                <img src="event3.jpg" alt="Sports Event"
                     title="Sports Event"
                     class="eventImage">
                <p>Sports Meet</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Dance Event"
                     title="Dance Event"
                     class="eventImage">
                <p>Dance Program</p>
            </td>

            <td>
                <img src="event5.jpg" alt="Art Event"
                     title="Art Event"
                     class="eventImage">
                <p>Art Exhibition</p>
            </td>

            <td>
                <img src="event6.jpg" alt="Tech Event"
                     title="Tech Event"
                     class="eventImage">
                <p>Tech Seminar</p>
            </td>
        </tr>
    </table>

</body>
</html>
