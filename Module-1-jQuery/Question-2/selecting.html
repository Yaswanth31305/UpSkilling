<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Selectors</title>

    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

</head>
<body>

    <h1>
        Original Heading
    </h1>

    <p id="para1">
        Paragraph One
    </p>

    <p id="para2">
        Paragraph Two
    </p>

    <button id="hideBtn">
        Hide Paragraph
    </button>

    <script>

        $(document).ready(function() {

            $("h1").text(
                "Updated Heading"
            );

            $("#hideBtn").click(function() {

                $("#para2").hide();

            });

        });

    </script>

</body>
</html>
