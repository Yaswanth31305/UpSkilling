<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Events Example</title>

    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js">
    </script>

    <style>

        #colorBox {

            width: 200px;

            height: 200px;

            border: 2px solid black;

            background-color: white;
        }

    </style>

</head>
<body>

    <button id="colorBtn">
        Change Color
    </button>

    <br><br>

    <div id="colorBox"></div>

    <script>

        $("#colorBtn").click(function() {

            $("#colorBox").css(
                "background-color",
                "red"
            );

        });

        $("#colorBtn").dblclick(function() {

            $("#colorBox").css(
                "background-color",
                "white"
            );

        });

    </script>

</body>
</html>
