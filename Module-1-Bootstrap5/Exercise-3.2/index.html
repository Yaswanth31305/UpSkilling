<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Grid Classes</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

    <div class="container">

        <div class="row">

            <div class="col-sm-4 bg-warning p-3">
                First Column
            </div>

            <div class="col-sm-4 bg-info p-3">
                Second Column
            </div>

            <div class="col-sm-4 bg-secondary text-white p-3">
                Third Column
            </div>

        </div>

    </div>

</body>
</html>
